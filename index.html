<body>
<header>展開学習付き AI 競馬アプリ（フルスペック版）</header>
<main>
  <!-- 入力エリア -->
  <div class="section-card">
    <div class="section-title">
      <span>レース指定</span>
    </div>
    <div class="input-row">
      <input id="raceUrlInput" type="text" placeholder="netkeiba レースURL or race_id（12桁）" />
      <button id="parseBtn">解析</button>

      <button id="todayBtn" class="secondary">今日のレース一覧</button>
    </div>
    <div class="small">
      ・URL例: https://race.netkeiba.com/race/shutuba.html?race_id=202406030811<br>
      ・race_id だけでもOK（例: 202406030811）
    </div>
  </div>

  <!-- 今日のレース一覧 -->
  <div class="section-card">
    <div class="section-title">
      <span>今日のレース一覧</span>
    </div>
    <div id="courseTabs"></div>
    <div id="raceListArea"></div>
  </div>

  <!-- 結果表示 -->
  <div id="resultArea"></div>
</main>

<script>
/* ===========================
   共通ユーティリティ
=========================== */
async function fetchHTML(url) {
  const res = await fetch(url, { credentials: "omit" });
  const text = await res.text();
  return text;
}
function htmlToDOM(html) {
  const parser = new DOMParser();
  return parser.parseFromString(html, "text/html");
}

/* ===========================
   race_id / URL ハンドリング
=========================== */
function extractRaceId(input) {
  input = input.trim();
  const m12 = input.match(/(\d{12})/);
  if (m12) return m12[1];
  return null;
}

/* ===========================
   競馬場コード → 名称
=========================== */
const COURSE_MAP = {
  "01": "札幌",
  "02": "函館",
  "03": "福島",
  "04": "新潟",
  "05": "東京",
  "06": "中山",
  "07": "中京",
  "08": "京都",
  "09": "阪神",
  "10": "小倉"
};

/* ===========================
   今日のレース一覧
=========================== */
async function fetchTodayRaceList() {
  const url = "https://race.netkeiba.com/top/race_list.html";
  const html = await fetchHTML(url);
  const doc = htmlToDOM(html);

  const links = [...doc.querySelectorAll("a[href*='race_id=']")];
  const races = [];
  for (const a of links) {
    const href = a.getAttribute("href") || "";
    const m = href.match(/race_id=(\d{12})/);
    if (!m) continue;
    const race_id = m[1];
    const label = a.textContent.trim();
    const time = await fetchRaceTime(race_id);
    races.push({ race_id, label, time });
  }
  return races;
}

async function fetchRaceTime(race_id) {
  const url = `https://race.netkeiba.com/race/newspaper.html?race_id=${race_id}`;
  try {
    const html = await fetchHTML(url);
    const doc = htmlToDOM(html);
    const text = doc.querySelector(".RaceData01")?.textContent || "";
    const m = text.match(/(\d{1,2}:\d{2})/);
    return m ? m[1] : null;
  } catch (e) {
    return null;
  }
}

function groupRacesByCourse(races) {
  const groups = {};
  races.forEach(r => {
    const courseCode = r.race_id.slice(8, 10);
    const courseName = COURSE_MAP[courseCode] || "不明";
    if (!groups[courseName]) groups[courseName] = [];
    groups[courseName].push(r);
  });
  return groups;
}

function sortRacesByTime(races) {
  return races.sort((a, b) => {
    if (!a.time) return 1;
    if (!b.time) return -1;
    return a.time.localeCompare(b.time);
  });
}

function renderCourseTabs(groups) {
  const tabArea = document.getElementById("courseTabs");
  tabArea.innerHTML = "";
  const courses = Object.keys(groups);
  courses.forEach((course, idx) => {
    const tab = document.createElement("div");
    tab.textContent = course;
    tab.className = "course-tab" + (idx === 0 ? " active" : "");
    tab.onclick = () => {
      [...tabArea.children].forEach(c => c.classList.remove("active"));
      tab.classList.add("active");
      renderRaceList(groups[course]);
    };
    tabArea.appendChild(tab);
  });
  if (courses.length > 0) {
    renderRaceList(groups[courses[0]]);
  }
}

function renderRaceList(races) {
  const area = document.getElementById("raceListArea");
  area.innerHTML = "";
  sortRacesByTime(races);
  races.forEach(r => {
    const div = document.createElement("div");
    div.className = "race-card";
    div.innerHTML = `
      <div class="race-card-title">${r.label}</div>
      <div class="race-card-meta">
        発走: ${r.time || "??:??"} / race_id: ${r.race_id}
      </div>
    `;
    div.onclick = () => {
      document.getElementById("raceUrlInput").value = r.race_id;
      window.scrollTo({ top: 0, behavior: "smooth" });
    };
    area.appendChild(div);
  });
}

/* ===========================
   ラップ抽出
=========================== */
function extractLapTimesFromNewspaper(doc) {
  const lapBox = doc.querySelector(".RaceLapBox");
  if (!lapBox) return null;
  const text = lapBox.textContent.replace(/\s+/g, " ").trim();
  const match = text.match(/(\d{1,2}\.\d)/g);
  if (!match) return null;
  return match.map(v => parseFloat(v));
}

async function fetchLapTimesForRace(race_id) {
  const url = `https://race.netkeiba.com/race/newspaper.html?race_id=${race_id}`;
  const html = await fetchHTML(url);
  const doc = htmlToDOM(html);
  return extractLapTimesFromNewspaper(doc);
}

/* ===========================
   ラップ特徴量
=========================== */
function lapAcceleration(laps) {
  if (!laps || laps.length < 2) return 0;
  return laps[0] - laps[laps.length - 1];
}
function lapSustain(laps) {
  if (!laps || laps.length < 2) return 0;
  const avg = laps.reduce((a,b)=>a+b,0) / laps.length;
  const variance = laps.reduce((a,b)=>a + Math.abs(b - avg), 0) / laps.length;
  return -variance;
}
function lapFade(laps) {
  if (!laps || laps.length < 2) return 0;
  return laps[laps.length - 1] - laps[0];
}
function lapPaceBias(laps) {
  if (!laps || laps.length < 6) return 0;
  const first = laps.slice(0,3).reduce((a,b)=>a+b,0);
  const last  = laps.slice(-3).reduce((a,b)=>a+b,0);
  return first - last;
}
function lapSharpness(laps) {
  if (!laps || laps.length < 2) return 0;
  let sum = 0;
  for (let i=1; i<laps.length; i++) {
    sum += Math.abs(laps[i] - laps[i-1]);
  }
  return sum;
}

function learnLapProfile(runs) {
  let acc = 0, sus = 0, fade = 0, pace = 0, sharp = 0, count = 0;
  runs.forEach(r => {
    if (!r.laps) return;
    acc  += lapAcceleration(r.laps);
    sus  += lapSustain(r.laps);
    fade += lapFade(r.laps);
    pace += lapPaceBias(r.laps);
    sharp+= lapSharpness(r.laps);
    count++;
  });
  if (count === 0) return null;
  return {
    acc: acc / count,
    sus: sus / count,
    fade: fade / count,
    pace: pace / count,
    sharp: sharp / count
  };
}

function classifyLapType(profile) {
  if (!profile) return "不明";
  const { acc, sus, fade, pace, sharp } = profile;
  if (acc > 0.3) return "瞬発型";
  if (sus > -0.15) return "持続型";
  if (fade > 0.3) return "消耗型";
  if (pace > 0.2) return "後半型";
  if (pace < -0.2) return "前半型";
  if (sharp > 1.5) return "メリハリ型";
  return "万能型";
}

/* ===========================
   馬ごとの展開癖DB
=========================== */
let horsePaceDB = JSON.parse(localStorage.getItem("horsePaceDB") || "{}");
function saveHorsePaceDB() {
  localStorage.setItem("horsePaceDB", JSON.stringify(horsePaceDB));
}
function updateHorsePaceProfile(horseName, actualPace, pos4c, finish) {
  if (!horsePaceDB[horseName]) {
    horsePaceDB[horseName] = {
      count: { slow:0, middle:0, high:0 },
      posSum: { slow:0, middle:0, high:0 },
      good: { slow:0, middle:0, high:0 }
    };
  }
  const rec = horsePaceDB[horseName];
  rec.count[actualPace]++;
  rec.posSum[actualPace] += pos4c;
  if (finish <= 3) rec.good[actualPace]++;
  saveHorsePaceDB();
}
function getHorsePaceProfile(name) {
  const rec = horsePaceDB[name];
  if (!rec) return null;
  const prof = { slow:null, middle:null, high:null };
  ["slow","middle","high"].forEach(p => {
    const c = rec.count[p] || 0;
    if (!c) return;
    prof[p] = {
      count: c,
      avgPos: rec.posSum[p] / c,
      goodRate: rec.good[p] / c
    };
  });
  return prof;
}

/* ===========================
   条件別展開学習DB
=========================== */
let paceLearnByCond = JSON.parse(localStorage.getItem("paceLearnByCond") || "{}");
function savePaceLearnByCond() {
  localStorage.setItem("paceLearnByCond", JSON.stringify(paceLearnByCond));
}
function getPaceConditionKey(ctx) {
  const dist = ctx.distance || 1800;
  const baba = ctx.baba || "良";
  const date = ctx.date || "2026-06-03";
  const month = date.slice(5,7);
  const course = ctx.course || "東京";
  const distType =
    dist <= 1400 ? "短距離" :
    dist <= 2000 ? "中距離" : "長距離";
  return `${course}_${distType}_${baba}_${month}`;
}
function paceToNum(p) {
  if (p === "slow") return 0;
  if (p === "middle") return 1;
  if (p === "high") return 2;
  return 1;
}
function learnPaceByCondition(predicted, actual, horses, ctx) {
  const key = getPaceConditionKey(ctx);
  if (!paceLearnByCond[key]) {
    paceLearnByCond[key] = {
      count: 0,
      sumDiff: 0,
      nigeSum: 0,
      senkoSum: 0,
      lapAccelSum: 0,
      lapFadeSum: 0
    };
  }
  const rec = paceLearnByCond[key];
  const diff = paceToNum(actual) - paceToNum(predicted);
  const nige = horses.filter(h => h.style === "逃げ").length;
  const senko = horses.filter(h => h.style === "先行").length;
  rec.count++;
  rec.sumDiff += diff;
  if (ctx.lapType === "加速戦") rec.lapAccelSum += diff;
  if (ctx.lapType === "消耗戦") rec.lapFadeSum += diff;
  rec.nigeSum += diff * nige;
  rec.senkoSum += diff * senko;
  savePaceLearnByCond();
}
function getConditionWeights(ctx) {
  const key = getPaceConditionKey(ctx);
  const rec = paceLearnByCond[key];
  if (!rec || rec.count < 3) return null;
  return {
    nigeW: rec.nigeSum / rec.count * 0.1,
    senkoW: rec.senkoSum / rec.count * 0.05,
    accelW: rec.lapAccelSum / rec.count * 0.2,
    fadeW: rec.lapFadeSum / rec.count * 0.2
  };
}

/* ===========================
   ラップ×展開×馬場 三次元相性
=========================== */
function lapPaceBaba3D(h, pace, baba) {
  if (!h.lapType) return 0;
  const type = h.lapType;
  const map = {
    "瞬発型": {
      "slow":  { "良": 6, "稍重": 4, "重": 2, "不良": 1 },
      "middle":{ "良": 4, "稍重": 3, "重": 2, "不良": 1 },
      "high":  { "良": 2, "稍重": 1, "重": 0, "不良": 0 }
    },
    "持続型": {
      "slow":  { "良": 3, "稍重": 4, "重": 5, "不良": 5 },
      "middle":{ "良": 4, "稍重": 5, "重": 6, "不良": 6 },
      "high":  { "良": 5, "稍重": 6, "重": 7, "不良": 7 }
    },
    "消耗型": {
      "slow":  { "良": 1, "稍重": 2, "重": 3, "不良": 4 },
      "middle":{ "良": 2, "稍重": 3, "重": 4, "不良": 5 },
      "high":  { "良": 4, "稍重": 5, "重": 7, "不良": 8 }
    },
    "後半型": {
      "slow":  { "良": 2, "稍重": 2, "重": 1, "不良": 1 },
      "middle":{ "良": 3, "稍重": 3, "重": 2, "不良": 1 },
      "high":  { "良": 5, "稍重": 4, "重": 3, "不良": 2 }
    },
    "前半型": {
      "slow":  { "良": 4, "稍重": 3, "重": 2, "不良": 1 },
      "middle":{ "良": 3, "稍重": 2, "重": 1, "不良": 0 },
      "high":  { "良": 1, "稍重": 0, "重": 0, "不良": 0 }
    },
    "メリハリ型": {
      "slow":  { "良": 3, "稍重": 3, "重": 2, "不良": 2 },
      "middle":{ "良": 4, "稍重": 4, "重": 3, "不良": 3 },
      "high":  { "良": 5, "稍重": 5, "重": 4, "不良": 4 }
    }
  };
  return map[type]?.[pace]?.[baba] ?? 0;
}

/* ===========================
   展開予測（根拠ログ付き）
=========================== */
function predictPaceAdvanced(horses, ctx) {
  let log = [];

  let nige = horses.filter(h => h.style === "逃げ").length;
  let senko = horses.filter(h => h.style === "先行").length;
  let sashi = horses.filter(h => h.style === "差し").length;
  let oikomi = horses.filter(h => h.style === "追込").length;

  log.push(`脚質分布：逃げ${nige} / 先行${senko} / 差し${sashi} / 追込${oikomi}`);

  let slow = 0, middle = 0, high = 0;

  high   += nige * 1.2;
  middle += senko * 0.7;
  slow   += (sashi + oikomi) * 0.5;
  log.push(`脚質分布補正 → high:${(nige*1.2).toFixed(1)} middle:${(senko*0.7).toFixed(1)} slow:${((sashi+oikomi)*0.5).toFixed(1)}`);

  let nigeBias = 0;
  horses.forEach(h => {
    if (h.style === "逃げ") nigeBias += (h.paceBias?.nigeBias || 0);
  });
  high   += nigeBias * 2;
  middle += nigeBias * 1;
  log.push(`逃げ癖（nigeBias=${nigeBias.toFixed(2)}） → high:+${(nigeBias*2).toFixed(1)} middle:+${(nigeBias*1).toFixed(1)}`);

  let lapType = "持続戦";
  if (ctx.laps && ctx.laps.length >= 4) {
    const L = ctx.laps;
    if (L[3] < L[2] && L[2] < L[1] && L[1] < L[0]) lapType = "加速戦";
    if (L[0] < L[1] && L[1] < L[2] && L[2] < L[3]) lapType = "消耗戦";
  }
  ctx.lapType = lapType;

  if (lapType === "加速戦") slow += 2;
  if (lapType === "持続戦") middle += 2;
  if (lapType === "消耗戦") high += 2;
  log.push(`ラップ傾向：${lapType} → slow/middle/high に +2`);

  const baba = ctx.baba || "良";
  if (baba === "良") slow += 1;
  if (baba === "稍重") middle += 1;
  if (baba === "重" || baba === "不良") high += 2;
  log.push(`馬場：${baba} → 補正あり`);

  const dist = ctx.distance || 1800;
  if (dist <= 1400) high += 2;
  if (dist >= 2000) slow += 1;
  log.push(`距離：${dist}m → 補正あり`);

  const condW = getConditionWeights(ctx);
  if (condW) {
    high   += nige  * condW.nigeW;
    middle += senko * condW.senkoW;
    if (lapType === "加速戦") slow += condW.accelW;
    if (lapType === "消耗戦") high += condW.fadeW;
    log.push(`条件別学習(${getPaceConditionKey(ctx)}) → nigeW:${condW.nigeW.toFixed(2)} senkoW:${condW.senkoW.toFixed(2)}`);
  }

  horses.forEach(h => {
    const prof = getHorsePaceProfile(h.name);
    if (!prof) return;
    if (prof.high && prof.high.avgPos <= 4) {
      high += 0.5;
      log.push(`${h.name}：ハイで前に行きやすい → high:+0.5`);
    }
    if (prof.slow && prof.slow.avgPos >= 8) {
      slow += 0.5;
      log.push(`${h.name}：スローで後ろから → slow:+0.5`);
    }
  });

  const maxVal = Math.max(slow, middle, high);
  const pace = (maxVal === high) ? "high" : (maxVal === middle) ? "middle" : "slow";

  log.push(`最終スコア → slow:${slow.toFixed(2)} middle:${middle.toFixed(2)} high:${high.toFixed(2)} → 展開:${pace}`);

  return { pace, log };
}

/* ===========================
   AI指数（超簡略版の骨組み）
=========================== */
function horsePaceAffinityBonus(h, pace) {
  const prof = getHorsePaceProfile(h.name);
  if (!prof || !prof[pace]) return 0;
  const avgPos = prof[pace].avgPos;
  if (pace === "high" && avgPos <= 4) return 3;
  if (pace === "slow" && avgPos >= 8) return 3;
  if (pace === "middle" && avgPos >= 4 && avgPos <= 8) return 2;
  return 0;
}

function calcAI(h, ctx, pace) {
  const base = 30;
  const lapProfile = h.lapProfile;
  const lapTypeVal = h.lapType === "瞬発型" ? 4 :
                     h.lapType === "持続型" ? 4 :
                     h.lapType === "消耗型" ? 3 : 2;
  const lapPaceBabaVal = lapPaceBaba3D(h, pace, ctx.baba || "良");
  const paceAffinityVal = horsePaceAffinityBonus(h, pace);
  return base + lapTypeVal + lapPaceBabaVal + paceAffinityVal;
}

/* ===========================
   出馬表取得（超簡略版ダミー）
   ※ 実戦では netkeiba shutuba.html をパースする
=========================== */
async function fetchShutubaAndHorseData(race_id) {
  // 本来はここで shutuba.html をパースして horses を作る
  // ここではデモ用にダミーデータを返す
  return [
    { name: "サンプルホースA", style: "先行", paceBias: { nigeBias: 0.2 }, runs: [] },
    { name: "サンプルホースB", style: "差し", paceBias: { nigeBias: 0.0 }, runs: [] },
    { name: "サンプルホースC", style: "逃げ", paceBias: { nigeBias: 0.5 }, runs: [] }
  ];
}

/* ===========================
   enrichHorseMeta
=========================== */
function enrichHorseMeta(horses) {
  horses.forEach(h => {
    const runs = h.runs || [];
    const profile = learnLapProfile(runs);
    h.lapProfile = profile;
    h.lapType = classifyLapType(profile);
  });
}

/* ===========================
   UI描画
=========================== */
function renderPaceLog(log) {
  const area = document.getElementById("resultArea");
  const card = document.createElement("div");
  card.className = "section-card";
