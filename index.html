<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>展開AI指数（URL版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #f2f2f7;
}
#resultArea {
  padding: 12px;
  margin-bottom: 220px;
}
.horse-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.card-header {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  font-weight: bold;
}
.ai-index {
  font-size: 26px;
  margin: 10px 0;
  font-weight: bold;
  color: #0a7a0a;
}
.section {
  margin: 8px 0;
  font-size: 14px;
  line-height: 1.4;
}
#actionBar {
  position: fixed;
  bottom: 160px;
  left: 0;
  width: 100%;
  background: #fff;
  padding: 10px;
  border-top: 1px solid #ddd;
  text-align: center;
}
#analyzeBtn {
  width: 90%;
  max-width: 480px;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #007aff;
  color: #fff;
  font-weight: bold;
}
#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #fafafa;
  padding: 10px;
  border-top: 1px solid #ddd;
}
#raceInput {
  width: 100%;
  height: 120px;
  font-size: 14px;
  padding: 8px;
  resize: none;
}
</style>
</head>

<body>

<div id="resultArea"></div>

<div id="actionBar">
  <button id="analyzeBtn">URLから解析する</button>
</div>

<div id="inputArea">
  <textarea id="raceInput" placeholder="netkeibaの出馬表URLを貼り付けてください"></textarea>
</div>

<script>
// ===============================
// URL → HTML取得（プロキシ経由）
// ===============================
async function fetchHTMLfromURL(url) {
  const api = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
  const res = await fetch(api);
  if (!res.ok) throw new Error("取得失敗");
  return await res.text();
}

// ===============================
// HTML → DOM
// ===============================
function htmlToDOM(html) {
  return new DOMParser().parseFromString(html, "text/html");
}

// ===============================
// 出馬表パース（netkeibaのHTML構造前提）
// ===============================
function parseRaceFromDOM(doc) {
  const rows = [...doc.querySelectorAll("table.Shutuba_Table tr")];
  const horses = [];

  rows.forEach(row => {
    const nameEl = row.querySelector("td.HorseInfo a");
    if (!nameEl) return;

    const h = {};
    h.name = nameEl.textContent.trim();
    h.jockey = row.querySelector("td.Jockey a")?.textContent.trim() || "";
    h.popularity = row.querySelector("td.Popular span")?.textContent.trim() || "";
    h.odds = row.querySelector("td.Odds span")?.textContent.trim() || "";
    h.weight = row.querySelector("td.Weight")?.textContent.trim() || "";
    h.runs = []; // URL版ではまず空のまま

    horses.push(h);
  });

  return horses;
}

// ===============================
// レース情報抽出（距離・馬場）
// ===============================
function extractRaceContextFromDOM(doc) {
  const ctx = {};

  // 距離（例：ダ1800m）
  const distText = doc.querySelector(".RaceData01")?.textContent || "";
  const distMatch = distText.match(/(\d+)m/);
  if (distMatch) ctx.distance = parseInt(distMatch[1]);

  // 馬場（例：ダート・良）
  const babaMatch = distText.match(/(良|稍重|重|不良)/);
  if (babaMatch) ctx.baba = babaMatch[1];

  return ctx;
}

// ===============================
// メタ（暫定：あとで学習ロジックに差し替え）
// ===============================
function enrichHorseMeta(horses) {
  horses.forEach(h => {
    h.style = "先行";
    h.lapType = "加速型";
    h.paceBias = { nigeBias: 0, senkoBias: 0, holdBias: 0, accelBias: 0 };
    h.distanceType = "中距離型";
    h.babaType = "良馬場型";
    h.paceCompatibility = 10;
    h.lastRunSummary = "前走情報（URL版では簡易）";
  });
}

// ===============================
// 展開予測（簡易）
// ===============================
function predictPace(horses) {
  // ここはあとで「脚質集計」ロジックに差し替え
  return "middle";
}

// ===============================
// AI指数（本物ロジックに差し替え可能な形）
// ===============================
function calcAI(h, ctx, pace) {
  // ここは前にまとめた本物ロジックを貼り替えればOK
  return 50 + (h.paceCompatibility || 0);
}

// ===============================
// カードUI
// ===============================
function renderAllCards(horses) {
  const area = document.getElementById("resultArea");
  let html = "";

  horses.forEach(h => {
    html += `
      <div class="horse-card">
        <div class="card-header">
          <div>${h.name}</div>
          <div>${h.popularity || "?"}人気 ${h.odds || "?"}倍</div>
        </div>

        <div class="ai-index">AI指数：${h.ai}</div>

        <div class="section">
          <div>騎手：${h.jockey || "—"}</div>
          <div>斤量：${h.weight || "—"}</div>
        </div>

        <div class="section">
          <div>展開：${h.pacePredict || "—"}</div>
          <div>ラップ適性：${h.lapType || "—"}</div>
          <div>距離適性：${h.distanceType || "—"}</div>
          <div>馬場適性：${h.babaType || "—"}</div>
        </div>
      </div>
    `;
  });

  area.innerHTML = html;
}

// ===============================
// メイン：URLから解析
// ===============================
document.getElementById("analyzeBtn").addEventListener("click", async () => {
  const url = document.getElementById("raceInput").value.trim();
  if (!url.startsWith("http")) {
    alert("netkeibaの出馬表URLを貼ってください");
    return;
  }

  try {
    const html = await fetchHTMLfromURL(url);
    const doc = htmlToDOM(html);

    const horses = parseRaceFromDOM(doc);
    if (horses.length === 0) {
      alert("出馬表テーブルが見つかりませんでした");
      return;
    }

    const ctx = extractRaceContextFromDOM(doc);
    enrichHorseMeta(horses);
    const pace = predictPace(horses);

    horses.forEach(h => {
      h.pacePredict = pace;
      h.ai = calcAI(h, ctx, pace);
    });

    renderAllCards(horses);
  } catch (e) {
    console.error(e);
    alert("URLから出馬表を取得できませんでした");
  }
});
</script>

</body>
</html>
