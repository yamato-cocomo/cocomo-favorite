<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>展開AI指数（URL版フル完成）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #f2f2f7;
}
#resultArea {
  padding: 12px;
  margin-bottom: 220px;
}
.horse-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.card-header {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  font-weight: bold;
}
.ai-index {
  font-size: 26px;
  margin: 10px 0;
  font-weight: bold;
  color: #0a7a0a;
}
.section {
  margin: 8px 0;
  font-size: 14px;
  line-height: 1.4;
}
#actionBar {
  position: fixed;
  bottom: 160px;
  left: 0;
  width: 100%;
  background: #fff;
  padding: 10px;
  border-top: 1px solid #ddd;
  text-align: center;
}
#analyzeBtn {
  width: 90%;
  max-width: 480px;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #007aff;
  color: #fff;
  font-weight: bold;
}
#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #fafafa;
  padding: 10px;
  border-top: 1px solid #ddd;
}
#raceInput {
  width: 100%;
  height: 120px;
  font-size: 14px;
  padding: 8px;
  resize: none;
}
</style>
</head>

<body>

<div id="resultArea"></div>

<div id="actionBar">
  <button id="analyzeBtn">URLから解析する</button>
</div>

<div id="inputArea">
  <textarea id="raceInput" placeholder="netkeibaの出馬表URLを貼り付けてください"></textarea>
</div>

<script>
// ===============================
// 共通：プロキシ経由でHTML取得
// ===============================
async function fetchHTML(url) {
  const api = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
  const res = await fetch(api);
  if (!res.ok) throw new Error("取得失敗: " + url);
  return await res.text();
}

function htmlToDOM(html) {
  return new DOMParser().parseFromString(html, "text/html");
}

// ===============================
// 出馬表ページのパース
// ===============================
function parseRaceFromDOM(doc) {
  const rows = [...doc.querySelectorAll("table.Shutuba_Table tr")];
  const horses = [];

  rows.forEach(row => {
    const nameEl = row.querySelector("td.HorseInfo a");
    if (!nameEl) return;

    const h = {};
    h.name = nameEl.textContent.trim();
    h.horseUrl = nameEl.getAttribute("href"); // /horse/xxxx/
    h.jockey = row.querySelector("td.Jockey a")?.textContent.trim() || "";
    h.popularity = row.querySelector("td.Popular span")?.textContent.trim() || "";
    h.odds = row.querySelector("td.Odds span")?.textContent.trim() || "";
    h.weight = row.querySelector("td.Weight")?.textContent.trim() || "";
    h.runs = [];

    horses.push(h);
  });

  return horses;
}

// ===============================
// レース情報（距離・馬場）
// ===============================
function extractRaceContextFromDOM(doc) {
  const ctx = {};

  const distText = doc.querySelector(".RaceData01")?.textContent || "";
  const distMatch = distText.match(/(\d+)m/);
  if (distMatch) ctx.distance = parseInt(distMatch[1]);

  const babaMatch = distText.match(/(良|稍重|重|不良)/);
  if (babaMatch) ctx.baba = babaMatch[1];

  ctx.surface = distText.includes("ダ") ? "ダート" : "芝";

  return ctx;
}

// ===============================
// 馬ごとの過去走取得
// ===============================
async function fetchPastRunsForHorse(horse) {
  if (!horse.horseUrl) return;
  const url = "https://db.netkeiba.com" + horse.horseUrl.replace("/horse/", "/horse/result/");
  const html = await fetchHTML(url);
  const doc = htmlToDOM(html);

  const rows = [...doc.querySelectorAll("table.db_h_race_results tr")].slice(1, 6); // 直近5走
  const runs = [];

  rows.forEach(row => {
    const tds = row.querySelectorAll("td");
    if (tds.length < 18) return;

    const date = tds[0]?.textContent.trim();
    const place = tds[1]?.textContent.trim();
    const distText = tds[13]?.textContent.trim(); // 距離
    const babaText = tds[14]?.textContent.trim(); // 馬場
    const timeText = tds[15]?.textContent.trim(); // タイム
    const passText = tds[16]?.textContent.trim(); // 通過（例 3-3-2-1）

    const distMatch = distText.match(/(\d+)/);
    const distance = distMatch ? parseInt(distMatch[1]) : null;

    const timeMatch = timeText.match(/(\d+)\.(\d)/); // 1:51.3 → 1.51 くらいに
    let raceTime = null;
    if (timeMatch) {
      raceTime = parseFloat(timeMatch[1] + "." + timeMatch[2]);
    }

    let pass = null;
    if (passText && passText.includes("-")) {
      pass = passText.split("-").map(x => parseInt(x));
      if (pass.length === 3) pass.push(pass[2]); // 3コーナーまでしかない場合の補完
    }

    runs.push({
      date,
      place,
      distance,
      baba: babaText,
      raceTime,
      pass
    });
  });

  horse.runs = runs;
}

// ===============================
// 学習ロジック：脚質・ラップ・距離・馬場・展開癖
// ===============================
function enrichHorseMeta(horses) {
  horses.forEach(h => {
    const runs = h.runs || [];

    // 脚質推定
    h.style = guessStyleFromRuns(runs);

    // ラップ適性
    h.lapType = guessLapTypeFromRuns(runs);

    // 距離適性
    h.distanceType = guessDistanceTypeFromRuns(runs);

    // 馬場適性
    h.babaType = guessBabaTypeFromRuns(runs);

    // 展開癖（簡易：先行/差し/追込バイアス）
    h.paceBias = learnPaceBiasFromRuns(runs);

    // 展開相性スコア（ここでは簡易にまとめる）
    h.paceCompatibility = calcPaceCompatibility(h);

    // 前走要約（簡易）
    h.lastRunSummary = runs[0]
      ? `${runs[0].place || ""} ${runs[0].distance || ""}m ${runs[0].baba || ""} 通過:${runs[0].pass || ""}`
      : "データ不足";
  });
}

function guessStyleFromRuns(runs) {
  if (!runs.length) return "不明";

  let sumFirst = 0;
  let count = 0;
  runs.forEach(r => {
    if (r.pass && r.pass[0]) {
      sumFirst += r.pass[0];
      count++;
    }
  });
  if (!count) return "不明";

  const avg = sumFirst / count;
  if (avg <= 3) return "逃げ";
  if (avg <= 6) return "先行";
  if (avg <= 10) return "差し";
  return "追込";
}

function guessLapTypeFromRuns(runs) {
  if (!runs.length) return "不明";

  let accel = 0, sustain = 0, decel = 0;

  runs.forEach(r => {
    if (!r.pass || r.pass.length < 4) return;
    const [p1, p2, p3, p4] = r.pass;
    if (p4 < p3 && p3 < p2 && p2 < p1) accel++;
    else if (p1 < p2 && p2 < p3 && p3 < p4) decel++;
    else sustain++;
  });

  if (accel >= sustain && accel >= decel) return "加速型";
  if (decel >= accel && decel >= sustain) return "減速型";
  return "持続型";
}

function guessDistanceTypeFromRuns(runs) {
  if (!runs.length) return "不明";
  const ds = runs.map(r => r.distance).filter(Boolean);
  if (!ds.length) return "不明";

  const avg = ds.reduce((a, b) => a + b, 0) / ds.length;
  if (avg <= 1600) return "短距離型";
  if (avg <= 2200) return "中距離型";
  return "長距離型";
}

function guessBabaTypeFromRuns(runs) {
  if (!runs.length) return "不明";

  let good = 0, bad = 0;
  runs.forEach(r => {
    if (!r.baba) return;
    if (r.baba.includes("良")) good++;
    if (r.baba.includes("稍") || r.baba.includes("重") || r.baba.includes("不")) bad++;
  });

  if (good === 0 && bad === 0) return "不明";
  if (bad > good) return "道悪型";
  if (good > bad) return "良馬場型";
  return "万能型";
}

function learnPaceBiasFromRuns(runs) {
  let nige = 0, senko = 0, sashi = 0, oikomi = 0;

  runs.forEach(r => {
    if (!r.pass || !r.pass[0]) return;
    const p = r.pass[0];
    if (p <= 3) nige++;
    else if (p <= 6) senko++;
    else if (p <= 10) sashi++;
    else oikomi++;
  });

  const total = nige + senko + sashi + oikomi || 1;
  return {
    nigeBias: nige / total,
    senkoBias: senko / total,
    holdBias: sashi / total,
    accelBias: oikomi / total
  };
}

function calcPaceCompatibility(h) {
  let score = 0;
  if (h.style === "逃げ") score += 4;
  if (h.style === "先行") score += 3;
  if (h.style === "差し") score += 2;
  if (h.style === "追込") score += 1;

  if (h.lapType === "加速型") score += 3;
  if (h.lapType === "持続型") score += 2;
  if (h.lapType === "減速型") score += 1;

  return score;
}

// ===============================
// 展開予測（脚質分布から）
// ===============================
function predictPace(horses) {
  let nige = 0, senko = 0, sashi = 0, oikomi = 0;

  horses.forEach(h => {
    if (h.style === "逃げ") nige++;
    else if (h.style === "先行") senko++;
    else if (h.style === "差し") sashi++;
    else if (h.style === "追込") oikomi++;
  });

  const total = nige + senko + sashi + oikomi || 1;
  const nigeRate = nige / total;
  const senkoRate = senko / total;

  if (nigeRate >= 0.3 || (nige + senko) >= 7) return "high";
  if (senkoRate >= 0.4) return "middle";
  return "slow";
}

// ===============================
// AI指数（本物ロジック）
// ===============================
function calcAI(h, ctx, pace) {
  const lastRun = h.runs?.[0];

  const lapScoreVal = lapScore(lastRun);
  const lapTypeVal = lapTypeBonus(h, ctx);
  const lapPaceVal = lapTypePaceBonus(h, pace);
  const babaLapVal = babaLapCompatibility(h, ctx);
  const distVal = distanceTypeBonus(h, ctx);
  const babaVal = babaTypeBonus(h, ctx);
  const timeVal = timeBonus(h, ctx);
  const jockeyVal = jockeyScore(h.jockey);
  const distScoreVal = distanceScore(h, ctx.distance);
  const surfaceVal = surfaceScore(h, ctx.surface);

  return (
    30 +
    lapScoreVal +
    lapTypeVal +
    lapPaceVal +
    h.paceCompatibility +
    babaLapVal +
    distVal +
    babaVal +
    timeVal +
    jockeyVal +
    distScoreVal +
    surfaceVal
  );
}

// ===== AI部品 =====
function lapScore(run) {
  if (!run || !run.pass) return 0;
  const [p1, p2, p3, p4] = run.pass;

  if (p4 < p3 && p3 < p2 && p2 < p1) return 6;
  if (p1 < p2 && p2 < p3 && p3 < p4) return 4;
  return 2;
}

function lapTypeBonus(h, ctx) {
  if (!h.lapType) return 0;
  if (h.lapType === "加速型") return 5;
  if (h.lapType === "持続型") return 3;
  if (h.lapType === "減速型") return 2;
  return 0;
}

function lapTypePaceBonus(h, pace) {
  if (!h.lapType) return 0;
  if (pace === "high" && h.lapType === "持続型") return 4;
  if (pace === "middle" && h.lapType === "加速型") return 3;
  if (pace === "slow" && h.lapType === "加速型") return 5;
  return 0;
}

function babaLapCompatibility(h, ctx) {
  if (!h.lapType || !ctx.baba) return 0;
  const baba = ctx.baba;
  let score = 0;

  if (baba === "良") {
    if (h.lapType === "加速型") score += 4;
    if (h.lapType === "持続型") score += 2;
  }
  if (baba === "稍重") {
    if (h.lapType === "持続型") score += 3;
    if (h.lapType === "減速型") score += 2;
  }
  if (baba === "重" || baba === "不良") {
    if (h.lapType === "持続型") score += 4;
    if (h.lapType === "減速型") score += 3;
  }
  return score;
}

function distanceTypeBonus(h, ctx) {
  if (!h.distanceType || !ctx.distance) return 0;
  const d = ctx.distance;

  if (h.distanceType === "短距離型" && d <= 1600) return 4;
  if (h.distanceType === "中距離型" && d > 1600 && d <= 2200) return 4;
  if (h.distanceType === "長距離型" && d > 2200) return 4;

  return 1;
}

function babaTypeBonus(h, ctx) {
  if (!h.babaType || !ctx.baba) return 0;

  if (h.babaType === "良馬場型" && ctx.baba === "良") return 4;
  if (h.babaType === "道悪型" && (ctx.baba === "稍重" || ctx.baba === "重" || ctx.baba === "不良")) return 5;

  return 1;
}

function timeBonus(h, ctx) {
  const run = h.runs?.[0];
  if (!run || !run.raceTime) return 0;

  if (run.raceTime <= 1.50) return 5;
  if (run.raceTime <= 1.52) return 3;
  if (run.raceTime <= 1.54) return 1;

  return 0;
}

function jockeyScore(j) {
  if (!j) return 0;
  if (["川田", "ルメール", "武豊"].some(x => j.includes(x))) return 5;
  if (["横山", "戸崎", "松山"].some(x => j.includes(x))) return 3;
  return 1;
}

function distanceScore(h, d) {
  if (!d) return 0;
  if (d >= 1800 && d <= 2000) return 3;
  if (d >= 1600 && d < 1800) return 2;
  return 1;
}

function surfaceScore(h, s) {
  return 0;
}

// ===============================
// カードUI
// ===============================
function renderAllCards(horses) {
  const area = document.getElementById("resultArea");
  let html = "";

  horses.forEach(h => {
    html += `
      <div class="horse-card">
        <div class="card-header">
          <div>${h.name}</div>
          <div>${h.popularity || "?"}人気 ${h.odds || "?"}倍</div>
        </div>

        <div class="ai-index">AI指数：${h.ai}</div>

        <div class="section">
          <div>騎手：${h.jockey || "—"}</div>
          <div>斤量：${h.weight || "—"}</div>
        </div>

        <div class="section">
          <div>脚質：${h.style || "—"}</div>
          <div>ラップ適性：${h.lapType || "—"}</div>
          <div>距離適性：${h.distanceType || "—"}</div>
          <div>馬場適性：${h.babaType || "—"}</div>
          <div>展開予測：${h.pacePredict || "—"}</div>
        </div>

        <div class="section">
          <div>前走要約：${h.lastRunSummary || "—"}</div>
        </div>
      </div>
    `;
  });

  area.innerHTML = html;
}

// ===============================
// メイン：URLから解析
// ===============================
document.getElementById("analyzeBtn").addEventListener("click", async () => {
  const url = document.getElementById("raceInput").value.trim();
  if (!url.startsWith("http")) {
    alert("netkeibaの出馬表URLを貼ってください");
    return;
  }

  try {
    const html = await fetchHTML(url);
    const doc = htmlToDOM(html);

    const horses = parseRaceFromDOM(doc);
    if (horses.length === 0) {
      alert("出馬表テーブルが見つかりませんでした");
      return;
    }

    const ctx = extractRaceContextFromDOM(doc);

    // 各馬の過去走取得（順番にやるので少し重いけど確実）
    for (const h of horses) {
      await fetchPastRunsForHorse(h);
    }

    // 学習
    enrichHorseMeta(horses);

    // 展開予測
    const pace = predictPace(horses);

    // AI指数計算
    horses.forEach(h => {
      h.pacePredict = pace;
      h.ai = calcAI(h, ctx, pace);
    });

    renderAllCards(horses);
  } catch (e) {
    console.error(e);
    alert("URLから出馬表を取得できませんでした");
  }
});
</script>

</body>
</html>
