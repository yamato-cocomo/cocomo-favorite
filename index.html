<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EVフィルター（東西スワイプ）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
    }

    button {
      padding: 8px 14px;
      margin: 4px;
      border-radius: 8px;
      border: none;
      background: #007bff;
      color: white;
    }

    .success { background: #28a745; }
    .danger { background: #dc3545; }
    .paste { background: #6f42c1; }

    .result-box {
      background: #fafafa;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #ddd;
    }

    .swiper-slide {
      display: flex;
      justify-content: center;
    }
  </style>
</head>

<body>

  <h2>EVフィルター（東西スワイプ）</h2>

  <div class="swiper">
    <div class="swiper-wrapper">

      <!-- 東 -->
      <div class="swiper-slide">
        <div class="card">
          <h3>【東会場】</h3>

          <label>的中率</label><br>
          <input id="east_winRate" type="number" step="0.01" value="0.32">

          <br><br>

          <label>2番人気オッズ</label><br>
          <input id="east_odds" type="number" step="0.1">

          <br><br>

          <button onclick="runEV('east')">EV判定</button>
          <button class="paste" onclick="pasteOdds('east')">オッズ貼り付け</button>

          <br>

          <button class="success" onclick="updateKokomo('east', true)">勝ち</button>
          <button class="danger" onclick="updateKokomo('east', false)">負け</button>

          <div id="east_kokomoStatus" class="result-box">ココモ状態：初期</div>
          <div id="east_resultArea" class="result-box">東会場の結果</div>
        </div>
      </div>

      <!-- 西 -->
      <div class="swiper-slide">
        <div class="card">
          <h3>【西会場】</h3>

          <label>的中率</label><br>
          <input id="west_winRate" type="number" step="0.01" value="0.32">

          <br><br>

          <label>2番人気オッズ</label><br>
          <input id="west_odds" type="number" step="0.1">

          <br><br>

          <button onclick="runEV('west')">EV判定</button>
          <button class="paste" onclick="pasteOdds('west')">オッズ貼り付け</button>

          <br>

          <button class="success" onclick="updateKokomo('west', true)">勝ち</button>
          <button class="danger" onclick="updateKokomo('west', false)">負け</button>

          <div id="west_kokomoStatus" class="result-box">ココモ状態：初期</div>
          <div id="west_resultArea" class="result-box">西会場の結果</div>
        </div>
      </div>

    </div>

    <div class="swiper-pagination"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="app.js?v=9999"></script>
<script>
  // URLパラメータからオッズを受け取る
  const params = new URLSearchParams(window.location.search);

  if (params.has("east_odds")) {
    document.getElementById("east_odds").value = params.get("east_odds");
    runEV("east");
  }

  if (params.has("west_odds")) {
    document.getElementById("west_odds").value = params.get("west_odds");
    runEV("west");
  }
</script>


  <script>
    new Swiper('.swiper', {
      loop: false,
      pagination: { el: '.swiper-pagination' },
    });
  </script>

</body>
</html>
